# Render Blueprint — deploy the SmartSprint API for free.
# In the Render dashboard: New → Blueprint → point at this repo. It reads this
# file. You still set DATABASE_URL and JWT_SECRET as env vars (see README).
services:
  - type: web
    name: smartsprint-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret for you
      - key: DATABASE_URL
        sync: false # you paste your Neon connection string here
      - key: CORS_ORIGINS
        value: "*"
      - key: GOOGLE_CLIENT_ID
        sync: false # paste your Google OAuth Web client ID (or leave blank)
      - key: APP_BASE_URL
        sync: false # your Flutter web app origin, e.g. https://app.example.com
      # ── Email / SMTP (invitations) — optional. Leave SMTP_HOST blank to skip
      # real email; invite accept links are returned by the API regardless. ──
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.12.7"
